name: 'Codeowner Verifier'
description: >-
  Verify that changed files have an effective owner per .github/CODEOWNERS (gitignore-style patterns,
  last matching rule wins).
author: 'Garret Patten'
branding:
  icon: shield
  color: blue

inputs:
  changedFiles:
    description: >-
      Space-delimited repository-relative paths of added or modified files (for example from git diff).
    required: true

  deletedFiles:
    description: >-
      Space-delimited repository-relative paths of deleted or moved files (for example from git diff --diff-filter=D).
    required: true

outputs:
  errorMessage:
    description: >-
      Set when the check fails: details listing files without an effective code owner.
      Empty or unset when the check passes.
  skipped:
    description: >-
      Set to the string `true` when verification was skipped because the inputs exceeded the size limit.
  skipReason:
    description: Human-readable explanation when `skipped` is set.

runs:
  using: node20
  main: dist/index.js
