name: Feature Request
description: Suggest an improvement or new capability for Codeowner Verifier
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow gap or limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How should the action behave instead? Examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or GitHub-native options you evaluated.
    validations:
      required: false
